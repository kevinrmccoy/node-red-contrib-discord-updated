<script type="text/x-red" data-help-name="discordReactionManager">
  <p><strong>What it does</strong> — Watches a single Discord message and reports every emoji reaction that people add or remove. Treat it like a live poll reader for that message.</p>
  <p><strong>When to use it</strong> — Great for reaction-role systems, quick votes, or keeping track of how many 👍 your announcement collects.</p>

  <h3>Inputs you send</h3>
  <dl class="message-properties">
    <dt>message <span class="property-type">object | string</span></dt>
    <dd>The target message. Pass the full message object (for best results) or just its id.</dd>
    <dt>channel <span class="property-type">object | string</span></dt>
    <dd>The channel that holds the message. Needed so the node can look the message up again.</dd>
    <dt class="optional">time <span class="property-type">number</span></dt>
    <dd>How long to keep listening, in milliseconds. Leave blank to use the 10 minute default.</dd>
    <dt class="optional">stop <span class="property-type">boolean</span></dt>
    <dd>Set to <code>true</code> to stop listening for reactions on the message specified by <code>msg.message</code>. No other fields are needed.</dd>
  </dl>

  <h3>What comes out</h3>
  <p>Every output message includes <code>msg.type</code> so you can tell what happened:</p>

  <h4><code>type: "open"</code> — collector started</h4>
  <dl class="message-properties">
    <dt>payload <span class="property-type">number</span></dt>
    <dd>The collection duration in milliseconds.</dd>
    <dt>message <span class="property-type">object | string</span></dt>
    <dd>The message being watched (echoed from input).</dd>
    <dt>channel <span class="property-type">object | string</span></dt>
    <dd>The channel containing the message (echoed from input).</dd>
  </dl>

  <h4><code>type: "set"</code> / <code>"remove"</code> — reaction added or removed</h4>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>The emoji that was pressed (Unicode or custom emoji name).</dd>
    <dt>count <span class="property-type">number</span></dt>
    <dd>How many people have used that emoji so far.</dd>
    <dt>message <span class="property-type">object</span></dt>
    <dd>The message we are monitoring, so you can reference it later.</dd>
    <dt>user <span class="property-type">object</span></dt>
    <dd>The user who just reacted.</dd>
  </dl>

  <h4><code>type: "end"</code> — collector stopped</h4>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd><code>"timeout"</code> if the collection time expired, or <code>"commanded"</code> if stopped via <code>msg.stop</code>.</dd>
    <dt>collected <span class="property-type">object</span></dt>
    <dd>An object mapping each emoji name to its reaction count, e.g. <code>{ "👍": 5, "👎": 2 }</code>.</dd>
    <dt>message <span class="property-type">object | string</span></dt>
    <dd>The message that was being watched (echoed from input).</dd>
    <dt>channel <span class="property-type">object | string</span></dt>
    <dd>The channel containing the message (echoed from input).</dd>
  </dl>

  <p>All output types include <code>_originalFlowMessage</code> with whatever you originally injected into this node.</p>

  <h3>Tips</h3>
  <ul>
    <li>Use a switch node on <code>msg.type</code> to separate reaction events (<code>set</code>/<code>remove</code>) from lifecycle signals (<code>open</code>/<code>end</code>).</li>
    <li>Wire the <code>end</code> output back into this node to automatically restart the collector after a timeout.</li>
    <li>After Node-RED restarts you must send the message/channel info again so the watcher can reattach.</li>
    <li>Wire the output into a switch node keyed on <code>msg.payload</code> to handle different emoji choices.</li>
    <li>Combine the <code>count</code> value with dashboard nodes to build a quick poll leaderboard.</li>
  </ul>
</script>
